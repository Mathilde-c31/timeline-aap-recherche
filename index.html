<!DOCTYPE html>
<html lang="fr">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Timeline AAP Recherche</title>

  <!-- SDK officiel Grist -->
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

  <!-- Apache ECharts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

  <!-- Feuille de style -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

  <header>

    <div class="title">

      <h1>📅 Timeline des appels à projets</h1>

      <p>
        Visualisation chronologique des périodes de candidature
      </p>

    </div>

    <div class="toolbar">

      <input
        id="search"
        type="text"
        placeholder="Rechercher un appel..."
      >

      <button id="resetZoom">
        Réinitialiser le zoom
      </button>

    </div>

  </header>

  <main>

    <div id="loading">

      Chargement des données Grist...

    </div>

    <div id="timeline"></div>

  </main>

  <footer>

    timeline-aap-recherche — Version 0.1

  </footer>

</div>

<script src="grist.js"></script>
<script src="script.js"></script>

</body>

</html>
